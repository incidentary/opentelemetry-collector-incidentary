apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "incidentary-bridge.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "incidentary-bridge.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "incidentary-bridge.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "incidentary-bridge.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        # Roll the Deployment when the rendered config changes — but NOT on
        # apiKey rotation (that goes through env from the Secret directly,
        # mirroring the operator's hot-swap pattern).
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "incidentary-bridge.serviceAccountName" . }}
      automountServiceAccountToken: false
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bridge
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--config=/etc/otelcol/config.yaml"
          env:
            - name: INCIDENTARY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "incidentary-bridge.apiKeySecretName" . }}
                  key: {{ include "incidentary-bridge.apiKeySecretKey" . }}
            - name: K8S_CLUSTER_NAME
              value: {{ .Values.cluster.name | quote }}
            - name: K8S_NAMESPACE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: K8S_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
            - name: health
              containerPort: {{ .Values.healthCheck.port }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.networkPolicy.metricsPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: {{ .Values.healthCheck.path }}
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: {{ .Values.healthCheck.path }}
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: {{ include "incidentary-bridge.configMapName" . }}
            items:
              - key: config.yaml
                path: config.yaml
        # readOnlyRootFilesystem=true means the collector can't scribble into
        # /tmp for receiver buffers; provide a small emptyDir.
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- range $c := . }}
        - {{- toYaml $c | nindent 10 }}
          labelSelector:
            matchLabels:
              {{- include "incidentary-bridge.selectorLabels" $ | nindent 14 }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
