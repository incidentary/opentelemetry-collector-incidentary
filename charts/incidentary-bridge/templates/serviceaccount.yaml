{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "incidentary-bridge.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "incidentary-bridge.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# The Bridge does not call the kube-apiserver, so the projected SA token
# is unnecessary. Disabling it shrinks the attack surface and avoids the
# token-rotation noise on long-lived pods.
automountServiceAccountToken: false
{{- end }}
