{{- if not .Values.existingSecretName }}
{{- if not .Values.apiKey }}
{{- fail "incidentary-bridge: .Values.apiKey is required (or set .Values.existingSecretName to use a pre-existing Secret)" }}
{{- end }}
{{- if not .Values.cluster.name }}
{{- fail "incidentary-bridge: .Values.cluster.name is required (used as resource.k8s.cluster.name on every forwarded batch)" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "incidentary-bridge.apiKeySecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "incidentary-bridge.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ include "incidentary-bridge.apiKeySecretKey" . }}: {{ .Values.apiKey | quote }}
{{- end }}
