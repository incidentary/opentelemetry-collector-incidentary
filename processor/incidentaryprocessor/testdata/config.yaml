# Canonical Bridge configuration in collector-processor mode. The
# trigger thresholds match the four 1.0.0 SDKs verbatim so the
# trigger-parity test holds without per-trigger tuning.

processors:
  incidentary:
    pre_alert_window: 5m
    max_buffer_size: 50000

    triggers:
      5xx_error_rate:
        high: 0.10
        low: 0.02
      slow_success_rate:
        high: 0.20
        mild: 0.10
      retry_rate:
        high: 0.10
        mild: 0.05
      in_flight_pileup:
        min_absolute_in_flight: 16
        baseline_multiplier: 3.0
        net_growth_min: 8
        severe_hold_secs: 6
        mild_hold_secs: 3

    forward:
      endpoint: https://api.incidentary.com/api/v1/otlp/v1/traces
      token: ${env:INCIDENTARY_API_KEY}
      pass_through: true
      timeout: 30s

    routing:
      statements: []

    extra_flush_conditions: []
